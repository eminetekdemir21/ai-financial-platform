version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: afp_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Production'da port disariya acilmaz
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: afp_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.prod
    container_name: afp_backend_prod
    restart: always
    env_file:
      - ./backend/.env.prod
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: afp_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

  celery_worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.prod
    container_name: afp_celery_prod
    restart: always
    env_file:
      - ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=warning --concurrency=2

volumes:
  postgres_data_prod:
