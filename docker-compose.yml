version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: afp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afp_password}
      POSTGRES_DB: ${POSTGRES_DB:-afp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afp_user} -d ${POSTGRES_DB:-afp_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: afp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: afp_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/ml_artifacts:/app/ml_artifacts
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  celery_worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: afp_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/ml_artifacts:/app/ml_artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info
volumes:
  postgres_data:
